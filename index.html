<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayrak Tahmin Oyunu</title>
  <style>
    :root {
      --bg-1: #f5f0e5;
      --bg-2: #dfe8f2;
      --card: #ffffff;
      --primary: #1f4e5f;
      --secondary: #f08a24;
      --ok: #2f8f46;
      --bad: #c74141;
      --muted: #6b7280;
      --shadow: 0 14px 35px rgba(10, 18, 31, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at 10% 20%, rgba(240, 138, 36, 0.15), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(31, 78, 95, 0.15), transparent 45%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px 12px;
    }

    .app {
      width: min(760px, 96vw);
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(31, 78, 95, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      color: var(--primary);
      font-size: clamp(1.6rem, 4vw, 2rem);
    }

    .subtitle {
      margin: 0 0 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .difficulty-wrap {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .difficulty-btn,
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .difficulty-btn {
      background: #edf2f7;
      color: #1f2937;
    }

    .difficulty-btn:hover,
    .btn:hover {
      transform: translateY(-1px);
    }

    .difficulty-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 20px rgba(31, 78, 95, 0.28);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0 22px;
    }

    .stat {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .stat-title {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 4px;
    }

    .stat-value {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .flag-box {
      display: grid;
      place-items: center;
      min-height: 148px;
      border-radius: 14px;
      background: linear-gradient(130deg, #f9fafb, #eef2ff);
      border: 1px dashed #cbd5e1;
      margin-bottom: 16px;
    }

    .flag {
      font-size: clamp(4rem, 14vw, 7rem);
      line-height: 1;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .flag img {
      width: min(280px, 78vw);
      max-height: 170px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
    }

    .question {
      text-align: center;
      margin: 0 0 14px;
      font-weight: 700;
      color: #111827;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .btn.answer {
      background: #f9fafb;
      border: 1px solid #d1d5db;
      color: #111827;
      text-align: left;
    }

    .btn.answer.correct {
      background: #e9f8ee;
      border-color: #a7e0b5;
      color: #155724;
    }

    .btn.answer.wrong {
      background: #fdecee;
      border-color: #f2b5bc;
      color: #7d1f28;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      transform: none;
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 700;
      text-align: center;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn.primary {
      background: var(--secondary);
      color: #fff;
    }

    .btn.ghost {
      background: #edf2f7;
      color: #1f2937;
    }

    .hidden {
      display: none !important;
    }

    .result {
      text-align: center;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }

    .result strong {
      color: var(--primary);
    }

    .status {
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid;
      margin-bottom: 12px;
      font-weight: 600;
      text-align: center;
    }

    .status.loading {
      background: #fff7e8;
      border-color: #f5d3a5;
      color: #7a4a12;
    }

    .status.error {
      background: #fdecee;
      border-color: #f2b5bc;
      color: #7d1f28;
    }

    @media (max-width: 640px) {
      .answers {
        grid-template-columns: 1fr;
      }

      .difficulty-wrap {
        grid-template-columns: 1fr;
      }

      .hud {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Bayrak Tahmin Oyunu</h1>
    <p class="subtitle">Sadece ülkeler var. Bölümünü seç: Kolay, Orta veya Zor.</p>
    <div class="status loading" id="loadingFallback" role="status" aria-live="polite">Oyun yukleniyor...</div>
    <div class="status error hidden" id="errorBox" role="alert"></div>
    <noscript>
      <div class="status error">Bu oyunu oynamak icin JavaScript'i etkinlestirmen gerekiyor.</div>
    </noscript>

    <section class="difficulty-wrap" aria-label="Zorluk Bölümleri">
      <button class="difficulty-btn active" data-level="easy">Kolay</button>
      <button class="difficulty-btn" data-level="medium">Orta</button>
      <button class="difficulty-btn" data-level="hard">Zor</button>
    </section>

    <section class="hud" aria-label="Skor Bilgisi">
      <div class="stat">
        <span class="stat-title">Bölüm</span>
        <span class="stat-value" id="levelLabel">Kolay</span>
      </div>
      <div class="stat">
        <span class="stat-title">Soru</span>
        <span class="stat-value"><span id="currentQ">1</span>/10</span>
      </div>
      <div class="stat">
        <span class="stat-title">Skor</span>
        <span class="stat-value" id="score">0</span>
      </div>
    </section>

    <section class="flag-box">
      <div class="flag" id="flagDisplay" aria-live="polite">🏳️</div>
    </section>

    <p class="question">Bu bayrak hangi ülkeye ait?</p>
    <section class="answers" id="answers"></section>

    <p class="feedback" id="feedback" aria-live="polite"></p>

    <section class="actions">
      <button class="btn primary hidden" id="nextBtn">Sonraki Soru</button>
      <button class="btn ghost" id="restartBtn">Bölümü Yeniden Başlat</button>
    </section>

    <section class="result hidden" id="resultBox">
      <p id="resultText"></p>
      <button class="btn primary" id="playAgainBtn">Tekrar Oyna</button>
    </section>
  </main>

  <script>
    const TOTAL_QUESTIONS = 10;
    const loadingFallbackEl = document.getElementById("loadingFallback");
    const errorBoxEl = document.getElementById("errorBox");

    function getReadableError(errorLike) {
      if (!errorLike) return "";
      if (typeof errorLike === "string") return errorLike;
      if (errorLike instanceof Error) return errorLike.message;
      try {
        return JSON.stringify(errorLike);
      } catch (err) {
        return String(errorLike);
      }
    }

    function showErrorBox(errorLike) {
      if (!errorBoxEl) return;
      const detail = getReadableError(errorLike);
      const base = "Oyun baslatilirken bir hata olustu. Sayfayi yenileyip tekrar dene.";
      errorBoxEl.textContent = detail ? `${base} (${detail})` : base;
      errorBoxEl.classList.remove("hidden");
    }

    function hideLoadingFallback() {
      if (loadingFallbackEl) {
        loadingFallbackEl.classList.add("hidden");
      }
    }

    window.addEventListener("error", (event) => {
      showErrorBox(event.error || event.message);
      hideLoadingFallback();
    });

    window.addEventListener("unhandledrejection", (event) => {
      showErrorBox(event.reason);
      hideLoadingFallback();
    });

    const countriesByLevel = {
      easy: [
        { name: "Turkiye", flag: "🇹🇷" },
        { name: "Almanya", flag: "🇩🇪" },
        { name: "Fransa", flag: "🇫🇷" },
        { name: "Italya", flag: "🇮🇹" },
        { name: "Ispanya", flag: "🇪🇸" },
        { name: "Birlesik Krallik", flag: "🇬🇧" },
        { name: "Amerika Birlesik Devletleri", flag: "🇺🇸" },
        { name: "Brezilya", flag: "🇧🇷" },
        { name: "Japonya", flag: "🇯🇵" },
        { name: "Guney Kore", flag: "🇰🇷" },
        { name: "Kanada", flag: "🇨🇦" },
        { name: "Meksika", flag: "🇲🇽" },
        { name: "Arjantin", flag: "🇦🇷" },
        { name: "Avustralya", flag: "🇦🇺" },
        { name: "Cin", flag: "🇨🇳" },
        { name: "Hindistan", flag: "🇮🇳" },
        { name: "Yunanistan", flag: "🇬🇷" },
        { name: "Rusya", flag: "🇷🇺" }
      ],
      medium: [
        { name: "Portekiz", flag: "🇵🇹" },
        { name: "Hollanda", flag: "🇳🇱" },
        { name: "Belcika", flag: "🇧🇪" },
        { name: "Avusturya", flag: "🇦🇹" },
        { name: "Isvec", flag: "🇸🇪" },
        { name: "Norvec", flag: "🇳🇴" },
        { name: "Danimarka", flag: "🇩🇰" },
        { name: "Isvicre", flag: "🇨🇭" },
        { name: "Polonya", flag: "🇵🇱" },
        { name: "Ukrayna", flag: "🇺🇦" },
        { name: "Fas", flag: "🇲🇦" },
        { name: "Misir", flag: "🇪🇬" },
        { name: "Suudi Arabistan", flag: "🇸🇦" },
        { name: "Pakistan", flag: "🇵🇰" },
        { name: "Endonezya", flag: "🇮🇩" },
        { name: "Tayland", flag: "🇹🇭" },
        { name: "Guney Afrika", flag: "🇿🇦" },
        { name: "Yeni Zelanda", flag: "🇳🇿" }
      ],
      hard: [
        { name: "Butan", flag: "🇧🇹" },
        { name: "Brunei", flag: "🇧🇳" },
        { name: "Esvatini", flag: "🇸🇿" },
        { name: "Lesotho", flag: "🇱🇸" },
        { name: "Kirgizistan", flag: "🇰🇬" },
        { name: "Tacikistan", flag: "🇹🇯" },
        { name: "Turkmenistan", flag: "🇹🇲" },
        { name: "Surinam", flag: "🇸🇷" },
        { name: "Guyana", flag: "🇬🇾" },
        { name: "Namibya", flag: "🇳🇦" },
        { name: "Mozambik", flag: "🇲🇿" },
        { name: "Komorlar", flag: "🇰🇲" },
        { name: "Vanuatu", flag: "🇻🇺" },
        { name: "Kiribati", flag: "🇰🇮" },
        { name: "Tuvalu", flag: "🇹🇻" },
        { name: "Sao Tome ve Principe", flag: "🇸🇹" },
        { name: "Antigua ve Barbuda", flag: "🇦🇬" },
        { name: "Dominika", flag: "🇩🇲" }
      ]
    };

    const levelNames = {
      easy: "Kolay",
      medium: "Orta",
      hard: "Zor"
    };

    const state = {
      level: "easy",
      score: 0,
      questionIndex: 0,
      usedIndices: new Set(),
      currentQuestion: null,
      answered: false
    };

    const flagDisplay = document.getElementById("flagDisplay");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const scoreEl = document.getElementById("score");
    const currentQEl = document.getElementById("currentQ");
    const levelLabel = document.getElementById("levelLabel");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const difficultyBtns = document.querySelectorAll(".difficulty-btn");

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sampleIndices(max, count, excludeIndex) {
      const indices = [];
      while (indices.length < count) {
        const i = Math.floor(Math.random() * max);
        if (i !== excludeIndex && !indices.includes(i)) {
          indices.push(i);
        }
      }
      return indices;
    }

    function flagEmojiToCountryCode(flagEmoji) {
      if (typeof flagEmoji !== "string") return "";
      const symbols = [...flagEmoji];
      if (symbols.length !== 2) return "";
      const base = 127462;
      const chars = symbols.map((ch) => {
        const cp = ch.codePointAt(0);
        if (typeof cp !== "number" || cp < base || cp > 127487) return "";
        return String.fromCharCode(cp - base + 65);
      });
      if (chars.includes("")) return "";
      return chars.join("").toLowerCase();
    }

    function getFlagImageUrl(flagEmoji) {
      const code = flagEmojiToCountryCode(flagEmoji);
      return code ? `https://flagcdn.com/w320/${code}.png` : "";
    }

    function renderFlag(flagEmoji, countryName) {
      flagDisplay.innerHTML = "";
      const url = getFlagImageUrl(flagEmoji);
      if (!url) {
        flagDisplay.textContent = countryName || "Bayrak";
        return;
      }

      const img = document.createElement("img");
      img.src = url;
      img.alt = `${countryName} bayragi`;
      img.loading = "eager";
      img.decoding = "async";
      img.referrerPolicy = "no-referrer";
      img.addEventListener("error", () => {
        flagDisplay.textContent = countryName || "Bayrak";
      });
      flagDisplay.appendChild(img);
    }

    function updateHud() {
      scoreEl.textContent = String(state.score);
      currentQEl.textContent = String(Math.min(state.questionIndex + 1, TOTAL_QUESTIONS));
      levelLabel.textContent = levelNames[state.level];
    }

    function resetRoundVisuals() {
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      nextBtn.classList.add("hidden");
      state.answered = false;
    }

    function endGame() {
      answersEl.innerHTML = "";
      flagDisplay.textContent = "🏁";
      const maxScore = TOTAL_QUESTIONS;
      const ratio = state.score / maxScore;
      let message = "";
      if (ratio >= 0.9) {
        message = "Mukemmel! Bayrak ustasisin.";
      } else if (ratio >= 0.6) {
        message = "Harika! Cok iyi gidiyorsun.";
      } else {
        message = "Guzel deneme! Bir tur daha yaparak gelistirebilirsin.";
      }
      resultText.innerHTML = `<strong>${state.score}/${maxScore}</strong> puan aldin. ${message}`;
      resultBox.classList.remove("hidden");
      nextBtn.classList.add("hidden");
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
    }

    function pickQuestion() {
      const pool = countriesByLevel[state.level];
      if (state.questionIndex >= TOTAL_QUESTIONS) {
        endGame();
        return;
      }

      let correctIndex;
      do {
        correctIndex = Math.floor(Math.random() * pool.length);
      } while (state.usedIndices.has(correctIndex) && state.usedIndices.size < pool.length);

      state.usedIndices.add(correctIndex);
      const correctCountry = pool[correctIndex];
      const wrongIndices = sampleIndices(pool.length, 3, correctIndex);
      const options = wrongIndices.map((i) => pool[i].name);
      options.push(correctCountry.name);
      const shuffledOptions = shuffle(options);

      state.currentQuestion = {
        correctName: correctCountry.name,
        flag: correctCountry.flag,
        options: shuffledOptions
      };

      renderQuestion();
    }

    function renderQuestion() {
      const q = state.currentQuestion;
      if (!q) return;

      resultBox.classList.add("hidden");
      renderFlag(q.flag, q.correctName);
      answersEl.innerHTML = "";
      q.options.forEach((option) => {
        const btn = document.createElement("button");
        btn.className = "btn answer";
        btn.textContent = option;
        btn.addEventListener("click", () => selectAnswer(btn, option));
        answersEl.appendChild(btn);
      });

      resetRoundVisuals();
      updateHud();
    }

    function selectAnswer(button, selectedName) {
      if (state.answered) return;
      state.answered = true;

      const correct = selectedName === state.currentQuestion.correctName;
      const allButtons = Array.from(document.querySelectorAll(".btn.answer"));

      allButtons.forEach((btn) => {
        btn.disabled = true;
        if (btn.textContent === state.currentQuestion.correctName) {
          btn.classList.add("correct");
        }
      });

      if (correct) {
        state.score += 1;
        button.classList.add("correct");
        feedbackEl.textContent = "Dogru cevap!";
        feedbackEl.className = "feedback ok";
      } else {
        button.classList.add("wrong");
        feedbackEl.textContent = `Yanlis. Dogru cevap: ${state.currentQuestion.correctName}`;
        feedbackEl.className = "feedback bad";
      }

      updateHud();
      nextBtn.classList.remove("hidden");
      if (state.questionIndex === TOTAL_QUESTIONS - 1) {
        nextBtn.textContent = "Sonucu Gor";
      } else {
        nextBtn.textContent = "Sonraki Soru";
      }
    }

    function resetGame(level = state.level) {
      state.level = level;
      state.score = 0;
      state.questionIndex = 0;
      state.usedIndices = new Set();
      state.currentQuestion = null;
      state.answered = false;
      resultBox.classList.add("hidden");
      updateHud();
      pickQuestion();
    }

    nextBtn.addEventListener("click", () => {
      state.questionIndex += 1;
      if (state.questionIndex >= TOTAL_QUESTIONS) {
        endGame();
      } else {
        pickQuestion();
      }
    });

    restartBtn.addEventListener("click", () => resetGame(state.level));
    playAgainBtn.addEventListener("click", () => resetGame(state.level));

    difficultyBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        const level = btn.dataset.level;
        difficultyBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        resetGame(level);
      });
    });

    function bootstrapGame() {
      try {
        resetGame("easy");
        hideLoadingFallback();
      } catch (error) {
        showErrorBox(error);
        hideLoadingFallback();
        console.error("Bayrak oyunu baslatma hatasi:", error);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootstrapGame);
    } else {
      bootstrapGame();
    }
  </script>
</body>
</html>
